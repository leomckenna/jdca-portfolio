<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDCA Commercial Portfolio Summary</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<script src="data.js"></script>
<style>
:root{--bg:#f0f2f5;--surface:#fff;--surface2:#f5f7fa;--border:#d8dde6;--navy:#1a2c4e;--navy-mid:#2d4a7a;--navy-light:#e8edf5;--accent:#9b1c2e;--gain:#1a6e3c;--gain-bg:#e8f5ee;--loss:#9b1c2e;--loss-bg:#fdf0f2;--neutral:#5a6a80;--text:#1a2c4e;--text-dim:#8a97ab;--text-mid:#4a5a72;--penny:#7a4a00;--penny-bg:#fff8e8;--penny-border:#e0b84a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;line-height:1.5;padding:36px 32px;}
.tab-bar{display:flex;border-bottom:3px solid var(--navy);margin-bottom:28px;}
.tab-btn{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;padding:10px 24px;border:none;background:var(--surface2);color:var(--text-dim);border-top:3px solid transparent;margin-bottom:-3px;border-radius:3px 3px 0 0;transition:all .15s;}
.tab-btn:hover{background:var(--navy-light);color:var(--navy);}
.tab-btn.active{background:var(--surface);color:var(--navy);border-top-color:var(--navy);font-weight:800;}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--navy);padding-bottom:14px;margin-bottom:28px;}
.header-left{display:flex;align-items:flex-end;gap:18px;}
.header-title{font-size:21px;font-weight:700;letter-spacing:-.01em;color:var(--navy);text-transform:uppercase;}
.header-title span{color:var(--accent);}
.header-subtitle{font-size:11.5px;color:var(--text-mid);margin-top:2px;font-style:italic;}
.header-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-mid);letter-spacing:.08em;text-transform:uppercase;text-align:right;border-left:2px solid var(--border);padding-left:16px;}
.section-label{font-size:9.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.grid-top{display:grid;grid-template-columns:1fr 220px;gap:20px;margin-bottom:20px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.grid-viz{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:3px;overflow:hidden;box-shadow:0 1px 4px rgba(26,44,78,.06);}
.card-header{padding:11px 18px 9px;border-bottom:2px solid var(--navy-light);background:var(--surface2);}
.card-body{padding:14px 18px;}
.stats-bar{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-bottom:20px;box-shadow:0 1px 4px rgba(26,44,78,.06);}
.stat-item{flex:1;padding:12px 16px;border-right:1px solid var(--border);background:var(--surface);border-top:3px solid var(--navy);}
.stat-item.accent{border-top-color:var(--accent);}
.stat-item:last-child{border-right:none;}
.stat-label{font-size:8.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;}
.stat-value{font-size:20px;font-weight:800;color:var(--navy);line-height:1.1;}
.gain-color{color:var(--gain);}.loss-color{color:var(--loss);}
.stat-sub{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--text-dim);margin-top:3px;}
.tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.06em;text-transform:uppercase;}
.sent-pos{background:var(--gain-bg);color:var(--gain);border:1px solid rgba(26,110,60,.2);}
.sent-neg{background:var(--loss-bg);color:var(--loss);border:1px solid rgba(155,28,46,.2);}
.sent-neu{background:var(--surface2);color:var(--neutral);border:1px solid var(--border);}
.penny-badge{display:inline-block;font-size:8.5px;font-weight:700;padding:1px 5px;border-radius:2px;background:var(--penny-bg);color:var(--penny);border:1px solid var(--penny-border);margin-left:4px;}
.impact-yes{display:inline-block;background:var(--gain-bg);color:var(--gain);border:1px solid rgba(26,110,60,.25);border-radius:2px;font-size:9px;font-weight:700;padding:2px 8px;text-transform:uppercase;}
.impact-no{display:inline-block;background:var(--surface2);color:var(--text-dim);border:1px solid var(--border);border-radius:2px;font-size:9px;font-weight:700;padding:2px 8px;text-transform:uppercase;}
.news-table{width:100%;border-collapse:collapse;}
.news-table thead tr{background:var(--navy);}
.news-table th{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);padding:10px 14px;text-align:left;}
.news-table th:last-child{text-align:center;}
.news-table td{padding:18px 14px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text-mid);line-height:1.65;font-size:12.5px;}
.news-table tr:last-child td{border-bottom:none;}
.news-table tr:hover td{background:var(--surface2);}
.company-name{font-weight:600;color:var(--navy);white-space:nowrap;font-size:12px;}
.topic-tag{font-family:'DM Mono',monospace;font-size:9px;color:var(--navy-mid);letter-spacing:.04em;}
.cap-table{width:100%;border-collapse:collapse;}
.cap-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text-mid);font-size:12px;}
.cap-table tr:last-child td{border-bottom:none;}
.cap-label{color:var(--navy);font-weight:600;}
.cap-count{font-family:'DM Mono',monospace;font-size:16px;font-weight:600;text-align:right;}
.cap-bar-cell{padding:9px 12px;width:80px;}
.cap-bar-bg{background:var(--navy-light);border-radius:2px;height:5px;overflow:hidden;}
.cap-bar{height:5px;border-radius:2px;background:var(--navy);}
.perf-table{width:100%;border-collapse:collapse;}
.perf-table thead tr{background:var(--navy);}
.perf-table th{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.75);padding:8px 12px;text-align:left;}
.perf-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text-mid);}
.perf-table tr:last-child td{border-bottom:none;}
.perf-table tr:hover td{background:var(--surface2);}
.ticker-cell{font-family:'DM Mono',monospace;font-weight:600;color:var(--navy);font-size:11.5px;}
.ret{font-family:'DM Mono',monospace;font-weight:600;text-align:right;}
.ret.gain{color:var(--gain);}.ret.loss{color:var(--loss);}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:var(--navy-light);color:var(--navy-mid);font-family:'DM Mono',monospace;font-size:9px;font-weight:600;margin-right:4px;}
.port-table{width:100%;border-collapse:collapse;font-size:11.5px;}
.port-table thead tr{background:var(--navy);}
.port-table th{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.75);padding:8px 10px;text-align:right;white-space:nowrap;}
.port-table th:nth-child(-n+4){text-align:left;}
.port-table td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--text-mid);text-align:right;white-space:nowrap;vertical-align:middle;}
.port-table td:nth-child(-n+4){text-align:left;}
.port-table tr:last-child td{border-bottom:none;}
.port-table tr:hover td{background:var(--surface2);}
.port-table tr.group-hdr td{background:var(--navy-light);color:var(--navy);font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:5px 10px;text-align:left;}
.tk{font-family:'DM Mono',monospace;font-weight:600;color:var(--navy);font-size:11px;}
.num{font-family:'DM Mono',monospace;}
.pos{color:var(--gain);font-weight:600;}.neg{color:var(--loss);font-weight:600;}
.ytd-chart{padding:12px 18px;}
.ytd-row{display:flex;align-items:center;margin-bottom:5px;gap:8px;}
.ytd-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-mid);width:72px;flex-shrink:0;text-align:right;}
.ytd-wrap{flex:1;position:relative;height:13px;display:flex;align-items:center;}
.ytd-bar{height:9px;border-radius:1px;}
.ytd-val{font-family:'DM Mono',monospace;font-size:9px;width:60px;flex-shrink:0;font-weight:600;}
.ytd-val.gain{color:var(--gain);}.ytd-val.loss{color:var(--loss);}
.footer{margin-top:28px;padding-top:12px;border-top:2px solid var(--navy);font-family:'DM Mono',monospace;font-size:9.5px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center;gap:16px;}
.footer-note{background:var(--navy-light);border:1px solid var(--border);border-radius:2px;padding:4px 10px;font-size:9px;color:var(--navy-mid);}
@media print{.tab-bar{display:none;}.tab-panel{display:block!important;page-break-before:always;}.tab-panel:first-child{page-break-before:auto;}.stats-bar,.card,.grid-top,.grid-2,.grid-viz{page-break-inside:avoid;break-inside:avoid;}}

/* ── NEWS IMPROVEMENTS ── */
.news-table td.news-company-cell{border-left:3px solid transparent;padding-left:11px;}
.news-table tr.side-gainer td.news-company-cell{border-left-color:var(--gain);}
.news-table tr.side-loser  td.news-company-cell{border-left-color:var(--loss);}
.news-table tr.side-neutral td.news-company-cell{border-left-color:var(--border);}
.news-ticker{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--navy);display:block;margin-bottom:2px;}
.news-section-hdr{padding:5px 14px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--border);}
.news-section-hdr.gain{background:#e8f5ee;color:var(--gain);}
.news-section-hdr.loss{background:#fdf0f2;color:var(--loss);}
.news-section-hdr.neut{background:var(--surface2);color:var(--neutral);}

/* ── COLUMN HEADER TOOLTIP ── */
th[data-ht]{position:relative;cursor:help;}
th[data-ht]:hover::after{content:attr(data-ht);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1a2c4e;color:#fff;font-size:10px;font-weight:400;letter-spacing:0;text-transform:none;white-space:nowrap;padding:5px 10px;border-radius:4px;z-index:200;pointer-events:none;line-height:1.4;}
th[data-ht]:hover::before{content:'';position:absolute;bottom:calc(100% + 1px);left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a2c4e;z-index:200;pointer-events:none;}

/* ── PENNY ROW HIGHLIGHT ── */
.port-table tr.penny-row td:not([colspan]){background:rgba(255,248,232,.55);}
.port-table tr.penny-row:hover td:not([colspan]){background:var(--navy-light);}

/* ── TOOLTIP ── */
#tt{position:fixed;background:#1a2c4e;color:#fff;padding:11px 15px;border-radius:7px;font-size:12px;pointer-events:none;z-index:9999;display:none;max-width:270px;box-shadow:0 4px 22px rgba(0,0,0,.3);line-height:1.65;}
#tt .tt-ticker{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;letter-spacing:.04em;margin-bottom:1px;}
#tt .tt-name{font-size:10.5px;color:#a8b8d0;margin-bottom:8px;}
#tt .tt-row{display:flex;justify-content:space-between;gap:20px;font-size:11px;color:#c8d8ea;line-height:1.7;}
#tt .tt-row strong{font-family:'DM Mono',monospace;font-weight:600;}
#tt .gain{color:#5dd88a;}#tt .loss{color:#f08090;}#tt .neut{color:#a8b8d0;}
#tt .tt-hint{font-size:9.5px;color:#6a8ab0;margin-top:8px;border-top:1px solid rgba(255,255,255,.1);padding-top:7px;}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(8,18,36,.55);z-index:10000;display:none;align-items:flex-start;justify-content:center;padding-top:52px;overflow-y:auto;}
#modal-overlay.open{display:flex;}
#modal-box{background:#fff;border-radius:10px;width:min(700px,94vw);max-height:84vh;overflow-y:auto;padding:30px 34px 28px;position:relative;box-shadow:0 16px 60px rgba(0,0,0,.24);margin-bottom:40px;}
#modal-close{position:absolute;top:16px;right:18px;width:30px;height:30px;border:none;background:var(--surface2);border-radius:50%;font-size:16px;cursor:pointer;color:var(--text-dim);display:flex;align-items:center;justify-content:center;line-height:1;transition:background .12s;}
#modal-close:hover{background:var(--navy-light);color:var(--navy);}
.modal-ticker-line{font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--text-dim);text-transform:uppercase;margin-bottom:3px;display:flex;align-items:center;gap:8px;}
.modal-name{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:18px;line-height:1.2;}
.modal-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:22px;}
.modal-metric{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:11px 13px;}
.modal-metric .mm-label{font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px;}
.modal-metric .mm-val{font-family:'DM Mono',monospace;font-size:15px;font-weight:600;color:var(--navy);}
.modal-news-wrap{background:var(--navy-light);border:1px solid var(--border);border-radius:9px;padding:20px 22px;}
.modal-news-wrap .mn-topic{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--navy-mid);margin-bottom:6px;}
.modal-news-wrap h4{font-size:14.5px;font-weight:700;color:var(--navy);margin-bottom:11px;line-height:1.3;}
.modal-news-wrap p{font-size:12.5px;color:var(--text-mid);line-height:1.7;margin-bottom:12px;}
.modal-takeaway{background:#fff;border-left:3px solid var(--navy);padding:11px 15px;border-radius:0 7px 7px 0;font-size:12px;color:var(--text);line-height:1.65;}
.modal-takeaway strong{color:var(--navy);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:5px;}
.modal-no-news{font-size:12px;color:var(--text-dim);font-style:italic;padding:14px 0;}
.modal-range-bar{height:8px;background:var(--navy-light);border-radius:4px;position:relative;margin:8px 0 4px;}
.modal-range-fill{height:100%;border-radius:4px;opacity:.25;position:absolute;top:0;left:0;}
.modal-range-dot{position:absolute;top:-5px;width:14px;height:14px;border-radius:50%;border:2.5px solid white;box-shadow:0 1px 4px rgba(0,0,0,.18);}
.modal-range-labels{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:9px;color:var(--text-dim);}

/* ── SCATTER LEGEND ── */
.scatter-legend{display:flex;gap:16px;padding:8px 14px 0;font-size:10px;color:var(--text-dim);}
.scatter-legend span{display:flex;align-items:center;gap:6px;}
.sl-circle{display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px solid var(--gain);background:rgba(26,110,60,.2);}
.sl-circle.loss{border-color:var(--loss);background:rgba(155,28,46,.2);}
.sl-circle.penny{border:1.5px dashed var(--gain);background:rgba(26,110,60,.1);}

/* ── INTERACTIVE HINTS ── */
.interact-hint{font-size:9px;font-weight:400;color:var(--text-dim);margin-left:8px;letter-spacing:0;text-transform:none;}

/* ── YTD ROW HOVER ── */
.ytd-row{cursor:pointer;border-radius:3px;padding:0 4px;transition:background .1s;}
.ytd-row:hover{background:var(--navy-light);}
</style>
</head>
<body>
<div id="tt"></div>
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal-box">
    <button id="modal-close" onclick="closeModal()" title="Close">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>
<div class="tab-bar" id="tabBar"></div>
<div id="panels"></div>

const PENNY = 5;
const CAP_ORDER = ['Large-cap','Mid-cap','Small-cap','Micro-cap'];

// ── HELPERS ──────────────────────────────────────────────────────────────────
const fmtP  = v => v >= 0 ? `+${v.toFixed(2)}%` : `\u2212${Math.abs(v).toFixed(2)}%`;
const fmtX  = v => v >= 0 ? `+${v.toFixed(2)}`  : `\u2212${Math.abs(v).toFixed(2)}`;
const fmtPx = v => v < 1 ? `$${v.toFixed(3)}` : v >= 1000 ? `$${Math.round(v).toLocaleString()}` : `$${v.toFixed(2)}`;
const isP   = h => h.price < PENNY;
const pBadge= h => isP(h) ? '<span class="penny-badge">\u00a2</span>' : '';
const sTag  = s => `<span class="tag sent-${s==='Positive'?'pos':s==='Negative'?'neg':'neu'}">${s}</span>`;
const rCls  = v => v >= 0 ? 'gain' : 'loss';
const cCls  = v => v >= 0 ? 'pos'  : 'neg';

// ── TAB SWITCH ───────────────────────────────────────────────────────────────
function switchTab(i) {
  document.querySelectorAll('.tab-panel').forEach((p,j) => p.classList.toggle('active', j===i));
  document.querySelectorAll('.tab-btn').forEach((b,j)   => b.classList.toggle('active', j===i));
  const pid = 'p'+i;
  const canvas = document.getElementById(pid+'-scatter');
  if (canvas) { canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); buildScatter(WEEKS[i].holdings, pid+'-scatter', i); }
}

// ── TOOLTIP HELPERS ───────────────────────────────────────────────────────────
const _tt = () => document.getElementById('tt');
function showTip(html, x, y) {
  const t = _tt(); t.innerHTML = html; t.style.display = 'block'; moveTip(x, y);
}
function moveTip(x, y) {
  const t = _tt(); if (t.style.display==='none') return;
  const tw=t.offsetWidth, th=t.offsetHeight, vw=window.innerWidth, vh=window.innerHeight;
  let lx=x+16, ly=y-12;
  if (lx+tw>vw-8) lx=x-tw-16;
  if (ly+th>vh-8) ly=vh-th-8;
  if (ly<8) ly=8;
  t.style.left=lx+'px'; t.style.top=ly+'px';
}
function hideTip() { _tt().style.display='none'; }

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function openModal(ticker, wIdx) {
  const w  = WEEKS[wIdx];
  const h  = w.holdings.find(x => x.ticker === ticker);
  if (!h) return;
  const news = (w.news || []).find(n => n.ticker === ticker) || null;
  const fmtP2 = v => v == null ? '—' : (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
  const fmt$  = v => v == null ? '—' : v < 1 ? '$'+v.toFixed(3) : v >= 1000 ? '$'+Math.round(v).toLocaleString() : '$'+v.toFixed(2);
  const gc    = v => v == null ? '' : v >= 0 ? 'color:var(--gain)' : 'color:var(--loss)';
  const sc    = h.sentiment==='Positive'?'var(--gain)':h.sentiment==='Negative'?'var(--loss)':'var(--neutral)';
  const pct52 = ((h.price-h.low52)/(h.high52-h.low52)*100).toFixed(0);
  const pfl   = ((h.price-h.low52)/h.low52*100).toFixed(1);
  const rangeBar = `<div class="modal-range-bar">
    <div class="modal-range-fill" style="width:${pct52}%;background:${gc(h.weekly).replace('color:','') || '#1a2c4e'}"></div>
    <div class="modal-range-dot" style="left:calc(${pct52}% - 7px);background:${gc(h.weekly).replace('color:','') || '#1a2c4e'}"></div>
  </div>
  <div class="modal-range-labels"><span>${fmt$(h.low52)} low</span><span>${pct52}% of range</span><span>${fmt$(h.high52)} high</span></div>`;
  const newsHtml = news
    ? `<div class="modal-news-wrap">
        <div class="mn-topic">${news.topic}</div>
        <h4>${news.company} &mdash; What Happened</h4>
        <p>${news.summary}</p>
        <div class="modal-takeaway"><strong>JDCA Takeaway</strong>${news.takeaway}</div>
       </div>`
    : `<div class="modal-no-news">No specific news coverage this week for ${h.ticker}.</div>`;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-ticker-line">
      <span style="font-family:'DM Mono',monospace">${h.ticker}</span>
      <span style="background:var(--navy-light);color:var(--navy-mid);font-size:9px;padding:2px 8px;border-radius:3px;font-weight:600;letter-spacing:.08em;">${h.cap}</span>
      ${isP(h)?'<span class="penny-badge">Penny</span>':''}
    </div>
    <div class="modal-name">${h.name}</div>
    <div class="modal-metrics">
      <div class="modal-metric"><div class="mm-label">Price</div><div class="mm-val">${fmt$(h.price)}</div></div>
      <div class="modal-metric"><div class="mm-label">1-Wk Return</div><div class="mm-val" style="${gc(h.weekly)}">${fmtP2(h.weekly)}</div></div>
      <div class="modal-metric"><div class="mm-label">YTD Return</div><div class="mm-val" style="${gc(h.ytd)}">${fmtP2(h.ytd)}</div></div>
      <div class="modal-metric"><div class="mm-label">vs. XLV</div><div class="mm-val" style="${gc(h.excessXlv)}">${h.excessXlv>=0?'+':''}${h.excessXlv.toFixed(1)} ppt</div></div>
      <div class="modal-metric"><div class="mm-label">Mkt Cap</div><div class="mm-val" style="font-size:13px">${h.mktCap}</div></div>
      <div class="modal-metric"><div class="mm-label">Rel. Volume</div><div class="mm-val">${h.relVol}%</div></div>
      <div class="modal-metric"><div class="mm-label">P/E</div><div class="mm-val">${h.pe ? h.pe.toFixed(1) : '—'}</div></div>
      <div class="modal-metric"><div class="mm-label">Curr. Ratio</div><div class="mm-val">${h.cr!=null ? h.cr.toFixed(2) : '—'}</div></div>
    </div>
    <div style="margin-bottom:18px;">
      <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px;">52-Week Range — +${pfl}% above 52-wk low</div>
      ${rangeBar}
    </div>
    <div style="margin-bottom:18px;"><div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px;">Sentiment</div>
      ${sTag(h.sentiment)}
    </div>
    ${newsHtml}`;
  const ov = document.getElementById('modal-overlay');
  ov.classList.add('open'); ov.scrollTop = 0;
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── STATS BAR ────────────────────────────────────────────────────────────────
function buildStats(w) {
  const h = w.holdings;
  const avg    = h.reduce((a,b)=>a+b.weekly,0)/h.length;
  const pctPos = Math.round(h.filter(d=>d.weekly>0).length/h.length*100);
  const avgXlv = h.reduce((a,b)=>a+b.excessXlv,0)/h.length;
  const pennies= h.filter(isP);
  const s = w.stats;
  return `<div class="stats-bar">
    <div class="stat-item"><div class="stat-label">Holdings</div><div class="stat-value">21</div><div class="stat-sub">Across 4 cap tiers</div></div>
    <div class="stat-item"><div class="stat-label">Best Weekly</div><div class="stat-value gain-color">${s.best.val}</div><div class="stat-sub">${s.best.sub}</div></div>
    <div class="stat-item"><div class="stat-label">Worst Weekly</div><div class="stat-value loss-color">${s.worst.val}</div><div class="stat-sub">${s.worst.sub}</div></div>
    <div class="stat-item"><div class="stat-label">Avg Weekly Return</div><div class="stat-value ${avg>=0?'gain-color':'loss-color'}">${fmtP(avg)}</div><div class="stat-sub">${pctPos}% positive this week</div></div>
    <div class="stat-item"><div class="stat-label">Portfolio vs. XLV</div><div class="stat-value ${avgXlv>=0?'gain-color':'loss-color'}">${fmtX(avgXlv)}</div><div class="stat-sub">Avg excess return (ppt)</div></div>
    <div class="stat-item accent"><div class="stat-label">Highest YTD Return</div><div class="stat-value gain-color">${s.highestYtd.val}</div><div class="stat-sub">${s.highestYtd.sub}</div></div>
    <div class="stat-item accent"><div class="stat-label">Penny Stocks (&lt;$5)</div><div class="stat-value">${pennies.length}</div><div class="stat-sub">${Math.round(pennies.length/h.length*100)}% of portfolio</div></div>
    <div class="stat-item"><div class="stat-label">Positive Sentiment</div><div class="stat-value">${s.positiveSentiment.val}</div><div class="stat-sub">${s.positiveSentiment.sub}</div></div>
  </div>`;

// ── NEWS TABLE ───────────────────────────────────────────────────────────────
function buildNews(w) {
  const gainers = w.news.filter(n=>n.side==='gainer');
  const losers  = w.news.filter(n=>n.side==='loser');
  const neutral = w.news.filter(n=>n.side==='neutral');
  const rows = (items, side) => items.map(n=>`<tr class="side-${side}">
    <td class="news-company-cell">
      <span class="news-ticker">${n.ticker}${n.penny?'<span class="penny-badge" style="font-size:7.5px;padding:1px 4px;margin-left:4px;">\u00a2</span>':''}</span>
      <div class="company-name" style="font-size:11.5px">${n.company}</div>
      ${sTag(n.sentiment)}
    </td>
    <td><span class="topic-tag">${n.topic}</span></td>
    <td>${n.summary}</td>
    <td>${n.takeaway}</td>
    <td style="text-align:center"><span class="${n.valImpact?'impact-yes':'impact-no'}">${n.valImpact?'Yes':'No'}</span></td>
  </tr>`).join('');
  const banner = (cls, icon, label) =>

  if (losers.length)  body += banner('loss','▼','Losers')  + rows(losers,'loser');
  if (neutral.length) body += banner('neut','◆','Other Developments') + rows(neutral,'neutral');
  return `<table class="news-table"><thead><tr>

// ── YTD CHART ────────────────────────────────────────────────────────────────
function buildYTD(holdings, id, wIdx) {
  const el = document.getElementById(id); if(!el) return;
  const sorted = [...holdings].sort((a,b)=>b.ytd-a.ytd);
  const maxAbs = Math.max(...sorted.map(d=>Math.abs(d.ytd)));
  sorted.forEach(d=>{
    const pct = Math.abs(d.ytd)/maxAbs*50;
    const isPos = d.ytd >= 0;
    const color = isPos ? 'var(--gain)' : 'var(--loss)';
    const badge = isP(d) ? '<span class="penny-badge" style="font-size:7px;padding:1px 3px;">\u00a2</span>' : '';
    const barStyle = 'width:'+pct+'%;background:'+color+';opacity:.75;height:9px;border-radius:2px;';
    const leftCell  = '<div style="width:50%;display:flex;align-items:center;border-right:1px solid #c0c8d8;">'
                    + (isPos ? '' : '<div style="'+barStyle+'margin-left:auto;"></div>')
                    + '</div>';
    const rightCell = '<div style="width:50%;display:flex;align-items:center;">'
                    + (isPos ? '<div style="'+barStyle+'"></div>' : '')
                    + '</div>';
    const row = document.createElement('div');
    row.className = 'ytd-row';
    row.innerHTML  = '<div class="ytd-lbl">'+d.ticker+badge+'</div>'
                   + '<div style="flex:1;display:flex;align-items:center;">'+leftCell+rightCell+'</div>'
                   + '<div class="ytd-val '+(isPos?'gain':'loss')+'">'+(isPos?'+':'')+d.ytd.toFixed(1)+'%</div>';
    // hover tooltip
    const sc = d.sentiment==='Positive'?'gain':d.sentiment==='Negative'?'loss':'neut';
    const wk = (d.weekly>=0?'+':'')+d.weekly.toFixed(2)+'%';
    row.addEventListener('mouseenter', e => {
      showTip(`<div class="tt-ticker">${d.ticker}</div><div class="tt-name">${d.name}</div>`+
        `<div class="tt-row"><span>YTD</span><strong class="${isPos?'gain':'loss'}">${isPos?'+':''}${d.ytd.toFixed(1)}%</strong></div>`+
        `<div class="tt-row"><span>This week</span><strong class="${d.weekly>=0?'gain':'loss'}">${wk}</strong></div>`+
        `<div class="tt-row"><span>Sentiment</span><strong class="${sc}">${d.sentiment}</strong></div>`+
        `<div class="tt-hint">Click to open detail view</div>`,
        e.clientX, e.clientY);
    });
    row.addEventListener('mousemove', e => moveTip(e.clientX, e.clientY));
    row.addEventListener('mouseleave', () => hideTip());
    row.addEventListener('click', () => openModal(d.ticker, wIdx));
    el.appendChild(row);
  });
}

function buildScatter(holdings, id, wIdx) {
  const canvas=document.getElementById(id); if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const parent=canvas.parentElement;
  const W=parent.getBoundingClientRect().width||400;
  const DPR=window.devicePixelRatio||1;
  canvas.width=W*DPR; canvas.height=380*DPR;
  canvas.style.width=W+'px'; canvas.style.height='380px';
  ctx.scale(DPR,DPR);
  const H=380, pad={top:30,right:20,bottom:36,left:44};
  const pW=W-pad.left-pad.right, pH=H-pad.top-pad.bottom;
  const xMin=-22,xMax=36,yMin=0,yMax=150;
  const px=v=>pad.left+(v-xMin)/(xMax-xMin)*pW;
  const py=v=>pad.top+pH-(Math.min(v,yMax)-yMin)/(yMax-yMin)*pH;
  // grid
  ctx.strokeStyle='#e8edf5';ctx.lineWidth=1;
  [-20,-15,-10,-5,0,5,10,15,20,25,30,35].forEach(x=>{
    ctx.beginPath();ctx.moveTo(px(x),pad.top);ctx.lineTo(px(x),pad.top+pH);ctx.stroke();
    ctx.fillStyle='#8a97ab';ctx.font='8px DM Mono,monospace';ctx.textAlign='center';
    ctx.fillText(x+'%',px(x),pad.top+pH+14);
  });
  [0,25,50,75,100,125,150].forEach(y=>{
    ctx.beginPath();ctx.moveTo(pad.left,py(y));ctx.lineTo(pad.left+pW,py(y));ctx.stroke();
    ctx.fillStyle='#8a97ab';ctx.font='8px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText(y+'%',pad.left-4,py(y)+3);
  });
  // zero line
  ctx.strokeStyle='#1a2c4e';ctx.lineWidth=1.2;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(px(0),pad.top);ctx.lineTo(px(0),pad.top+pH);ctx.stroke();ctx.setLineDash([]);
  // avg vol line
  ctx.strokeStyle='#8a97ab';ctx.lineWidth=1;ctx.setLineDash([2,3]);
  ctx.beginPath();ctx.moveTo(pad.left,py(100));ctx.lineTo(pad.left+pW,py(100));ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#8a97ab';ctx.font='8px DM Mono,monospace';ctx.textAlign='left';
  ctx.fillText('avg vol',pad.left+4,py(100)-4);
  // axis labels
  ctx.fillStyle='#4a5a72';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
  ctx.fillText('Weekly Return',pad.left+pW/2,H-4);
  ctx.save();ctx.translate(11,pad.top+pH/2);ctx.rotate(-Math.PI/2);ctx.fillText('Relative Volume',0,0);ctx.restore();
  // label hints (permanently labelled tickers)
  const hints={'NVO':{dx:-7,dy:-8,a:'right'},'GNPX':{dx:7,dy:-8,a:'left'},'FLUI.ST':{dx:7,dy:-8,a:'left'},
    'NXTCL.ST':{dx:7,dy:12,a:'left'},'SABS':{dx:-7,dy:-8,a:'right'},'SANA':{dx:7,dy:-8,a:'left'},
    'SNY':{dx:7,dy:-8,a:'left'},'IPSC':{dx:7,dy:12,a:'left'},'CRSP':{dx:7,dy:-8,a:'left'},'EVO':{dx:-7,dy:12,a:'right'}};
  // build dot positions for hit-testing (CSS px coords)
  const dots = holdings.map(d=>({x:px(d.weekly), y:py(Math.min(d.relVol,yMax)), data:d}));
  // draw points
  holdings.forEach(d=>{
    const xc=px(d.weekly),yc=py(Math.min(d.relVol,yMax)),color=d.weekly>=0?'#1a6e3c':'#9b1c2e';
    ctx.beginPath();ctx.arc(xc,yc,5,0,Math.PI*2);ctx.fillStyle=color+'30';ctx.fill();
    ctx.strokeStyle=color;ctx.lineWidth=isP(d)?1.8:1.5;
    if(isP(d))ctx.setLineDash([2,1.5]);ctx.stroke();ctx.setLineDash([]);
    if(hints[d.ticker]){const o=hints[d.ticker];ctx.fillStyle='#1a2c4e';ctx.font='bold 8px DM Mono,monospace';ctx.textAlign=o.a;ctx.fillText(d.ticker,xc+o.dx,yc+o.dy);}
  });
  // off-scale annotations
  holdings.filter(d=>d.relVol>150).forEach(d=>{
    const xc=px(d.weekly),color=d.weekly>=0?'#1a6e3c':'#9b1c2e';
    ctx.fillStyle=color;ctx.font='bold 8px DM Mono,monospace';ctx.textAlign='left';
    ctx.fillText(`${d.ticker} (${d.relVol}%)`,xc+7,pad.top+14);
    ctx.strokeStyle=color;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(xc,pad.top+18);ctx.lineTo(xc,pad.top+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(xc-4,pad.top+10);ctx.lineTo(xc,pad.top+4);ctx.lineTo(xc+4,pad.top+10);ctx.stroke();
  });
  // ── hover & click ─────────────────────────────────────────────────────────
  canvas._scatterDots = dots; canvas._scatterWIdx = wIdx;
  if (!canvas._scatterBound) {
    canvas._scatterBound = true;
    canvas.addEventListener('mousemove', function(e) {
      const rect=this.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
      let hit=null;
      for (const dot of this._scatterDots) { const dx=mx-dot.x,dy=my-dot.y; if(dx*dx+dy*dy<100){hit=dot.data;break;} }
      if (hit) {
        const wk=(hit.weekly>=0?'+':'')+hit.weekly.toFixed(2)+'%';
        const wc=hit.weekly>=0?'gain':'loss';
        const sc=hit.sentiment==='Positive'?'gain':hit.sentiment==='Negative'?'loss':'neut';
        showTip(`<div class="tt-ticker">${hit.ticker}</div><div class="tt-name">${hit.name}</div>`+
          `<div class="tt-row"><span>Weekly</span><strong class="${wc}">${wk}</strong></div>`+
          `<div class="tt-row"><span>Rel. Vol</span><strong>${hit.relVol}%</strong></div>`+
          `<div class="tt-row"><span>Sentiment</span><strong class="${sc}">${hit.sentiment}</strong></div>`+
          `<div class="tt-hint">Click to open detail view</div>`, e.clientX, e.clientY);
        this.style.cursor='pointer';
      } else { hideTip(); this.style.cursor='default'; }
    });
    canvas.addEventListener('mouseleave', function(){ hideTip(); this.style.cursor='default'; });
    canvas.addEventListener('click', function(e){
      const rect=this.getBoundingClientRect(), mx=e.clientX-rect.left, my=e.clientY-rect.top;
      for (const dot of this._scatterDots){ const dx=mx-dot.x,dy=my-dot.y; if(dx*dx+dy*dy<100){openModal(dot.data.ticker,this._scatterWIdx);break;} }
    });
  }
}

        `<div class="tt-row"><span>52-Wk High</span><strong>${fmt(d.high52)}</strong></div>`+
        `<div class="tt-row"><span>Weekly</span><strong class="${wc}">${wk}</strong></div>`+
        `<div class="tt-row"><span>Sentiment</span><strong class="${sc}">${d.sentiment}</strong></div>`+
        `<div class="tt-hint">Click to open detail view</div>`, e.clientX, e.clientY);
    });
    row.addEventListener('mousemove', e=>moveTip(e.clientX,e.clientY));
    row.addEventListener('mouseleave', function(){ this.style.background=''; hideTip(); });
    row.addEventListener('click', ()=>openModal(d.ticker, wIdx));
    el.appendChild(row);
  });
}

// ── 52-WEEK PERFORMANCE CHART (static data from data.js) ─────────────────────
function indexTo100(pairs) {
  if (!pairs || !pairs.length) return [];
  const base = pairs[0][1];
  if (!base) return [];
  return pairs.map(x => ({ t: x[0], v: (x[1] / base) * 100 }));
}

function drawPerfChart(canvasId, pid, hIndexed, xIndexed, ticker, name) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const parent = canvas.parentElement;
  const W = parent.getBoundingClientRect().width || 600;
  const DPR = window.devicePixelRatio || 1;
  canvas.width  = W * DPR;
  canvas.height = 260 * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = '260px';
  ctx.scale(DPR, DPR);

  const H = 260;
  const pad = { top: 18, right: 72, bottom: 32, left: 48 };
  const pW = W - pad.left - pad.right;
  const pH = H - pad.top  - pad.bottom;

  if (!hIndexed.length && !xIndexed.length) {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#8a97ab';
    ctx.font = '12px DM Sans,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No history data — rerun notebook to populate', W / 2, H / 2);
    return;
  }

  const allVals = [...hIndexed.map(d=>d.v), ...xIndexed.map(d=>d.v)];
  const vMin = Math.min(...allVals);
  const vMax = Math.max(...allVals);
  const vPad = Math.max((vMax - vMin) * 0.1, 3);
  const yLo = vMin - vPad, yHi = vMax + vPad;

  const allTs = [...hIndexed.map(d=>d.t), ...xIndexed.map(d=>d.t)];
  const tMin = Math.min(...allTs), tMax = Math.max(...allTs);
  const tRange = tMax - tMin || 1;

  const px = t => pad.left + (t - tMin) / tRange * pW;
  const py = v => pad.top  + (1 - (v - yLo) / (yHi - yLo)) * pH;

  ctx.clearRect(0, 0, W, H);

  // Y grid + labels
  const ySteps = 5;
  const yStep  = (yHi - yLo) / ySteps;
  ctx.strokeStyle = '#e8edf5'; ctx.lineWidth = 1;
  ctx.fillStyle = '#8a97ab'; ctx.font = '9px DM Mono,monospace'; ctx.textAlign = 'right';
  for (let i = 0; i <= ySteps; i++) {
    const v = yLo + yStep * i;
    const y = py(v);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + pW, y); ctx.stroke();
    ctx.fillText(v.toFixed(0), pad.left - 5, y + 3);
  }

  // Baseline 100
  if (yLo < 100 && yHi > 100) {
    ctx.strokeStyle = '#b0bcc8'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(pad.left, py(100)); ctx.lineTo(pad.left + pW, py(100)); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#8a97ab'; ctx.font = '8px DM Mono,monospace'; ctx.textAlign = 'left';
    ctx.fillText('100', pad.left + 4, py(100) - 3);
  }

  // X axis — evenly spaced labels, clamped to plot area so last date never clips
  const labelCount = 6;
  ctx.fillStyle = '#8a97ab'; ctx.font = '9px DM Mono,monospace';
  for (let i = 0; i <= labelCount; i++) {
    const t = tMin + (tRange / labelCount) * i;
    const x = Math.max(pad.left + 18, Math.min(px(t), pad.left + pW - 18));
    const d = new Date(t);
    const label = (d.getMonth() + 1) + '/' + d.getFullYear().toString().slice(2);
    ctx.textAlign = i === 0 ? 'left' : i === labelCount ? 'right' : 'center';
    ctx.fillText(label, x, H - 6);
  }

  // XLV line (accent red, lighter)
  if (xIndexed.length > 1) {
    ctx.strokeStyle = 'rgba(155,28,46,0.5)'; ctx.lineWidth = 1.8; ctx.lineJoin = 'round';
    ctx.beginPath();
    xIndexed.forEach((d, i) => i === 0 ? ctx.moveTo(px(d.t), py(d.v)) : ctx.lineTo(px(d.t), py(d.v)));
    ctx.stroke();
  }

  // Holding line (navy, bold)
  if (hIndexed.length > 1) {
    ctx.strokeStyle = '#1a2c4e'; ctx.lineWidth = 2.2; ctx.lineJoin = 'round';
    ctx.beginPath();
    hIndexed.forEach((d, i) => i === 0 ? ctx.moveTo(px(d.t), py(d.v)) : ctx.lineTo(px(d.t), py(d.v)));
    ctx.stroke();
  }

  // Right-margin end-point labels
  const fmtRel = v => (v >= 100 ? '+' : '') + (v - 100).toFixed(1) + '%';
  ctx.textAlign = 'left';
  if (hIndexed.length) {
    const last = hIndexed[hIndexed.length - 1];
    ctx.fillStyle = '#1a2c4e'; ctx.font = 'bold 9px DM Sans,sans-serif';
    ctx.fillText(ticker + ': ' + fmtRel(last.v), pad.left + pW + 5, py(last.v) + 4);
  }
  if (xIndexed.length) {
    const lastX = xIndexed[xIndexed.length - 1];
    ctx.fillStyle = 'rgba(155,28,46,0.8)'; ctx.font = '9px DM Sans,sans-serif';
    ctx.fillText('XLV: ' + fmtRel(lastX.v), pad.left + pW + 5, py(lastX.v) + 4);
  }

  // Cache for hover
  canvas._perfData = { hIndexed, xIndexed, px, py, pad, pW, pH, ticker, name };
}

function buildPerfChart(holdings, xlvHistory, pid) {
  const selectEl = document.getElementById(pid + '-perf-ticker');
  const statusEl = document.getElementById(pid + '-perf-status');
  const canvasId = pid + '-perf';
  if (!selectEl || !statusEl) return;

  const xlvIndexed = indexTo100(xlvHistory || []);

  selectEl.innerHTML = '';
  holdings.forEach(h => {
    const opt = document.createElement('option');
    opt.value = h.ticker;
    opt.textContent = h.ticker + ' — ' + h.name;
    selectEl.appendChild(opt);
  });

  function load(ticker) {
    const h = holdings.find(x => x.ticker === ticker);
    if (!h) return;
    const hasData = h.history && h.history.length > 0;
    statusEl.style.display = hasData ? 'none' : 'block';
    if (!hasData) statusEl.textContent = 'No history for ' + ticker + ' — rerun notebook to populate.';
    const hIndexed = indexTo100(h.history || []);
    drawPerfChart(canvasId, pid, hIndexed, xlvIndexed, ticker, h.name);
    attachPerfHover(canvasId, pid);
  }

  selectEl.addEventListener('change', () => load(selectEl.value));
  if (holdings.length) load(holdings[0].ticker);
}

function attachPerfHover(canvasId, pid) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || canvas._perfHoverBound) return;
  canvas._perfHoverBound = true;

  canvas.addEventListener('mousemove', function(e) {
    const data = this._perfData;
    if (!data) return;
    const rect = this.getBoundingClientRect();
    const scaleX = this.width / rect.width;
    const DPR = window.devicePixelRatio || 1;
    const mx = (e.clientX - rect.left) * scaleX / DPR;
    const { hIndexed, xIndexed, px, py, pad, pW, pH, ticker, name } = data;
    if (!hIndexed.length && !xIndexed.length) { hideTip(); return; }

    // Nearest holding point by x
    let best = null, bestDx = Infinity;
    hIndexed.forEach(d => { const dx = Math.abs(px(d.t) - mx); if (dx < bestDx) { bestDx = dx; best = d; }});
    if (!best || bestDx > 40) { hideTip(); this.style.cursor = 'default'; return; }

    // Nearest XLV point at same timestamp
    let xlvBest = null, xlvDx = Infinity;
    xIndexed.forEach(d => { const dx = Math.abs(px(d.t) - mx); if (dx < xlvDx) { xlvDx = dx; xlvBest = d; }});

    const fmtDate = ts => { const d = new Date(ts); return (d.getMonth()+1)+'/'+d.getDate()+'/'+d.getFullYear().toString().slice(2); };
    const fmtRel  = v => (v >= 100 ? '+' : '') + (v - 100).toFixed(2) + '%';
    const hColor  = best.v >= 100 ? '#5dd88a' : '#f08090';

    let html = '<div class="tt-ticker">' + ticker + '</div><div class="tt-name">' + name + '</div>'
      + '<div class="tt-row"><span>Date</span><strong>' + fmtDate(best.t) + '</strong></div>'
      + '<div class="tt-row"><span>' + ticker + ' vs start</span><strong style="color:' + hColor + '">' + fmtRel(best.v) + '</strong></div>';
    if (xlvBest) {
      const xColor = xlvBest.v >= 100 ? '#5dd88a' : '#f08090';
      html += '<div class="tt-row"><span>XLV vs start</span><strong style="color:' + xColor + '">' + fmtRel(xlvBest.v) + '</strong></div>';
      const spread = best.v - xlvBest.v;
      const sc = spread >= 0 ? '#5dd88a' : '#f08090';
      html += '<div class="tt-row"><span>Spread vs XLV</span><strong style="color:' + sc + '">' + (spread >= 0 ? '+' : '') + spread.toFixed(2) + ' ppt</strong></div>';
    }
    showTip(html, e.clientX, e.clientY);
    this.style.cursor = 'crosshair';

    // Crosshair overlay
    const ctx = this.getContext('2d');
    const DPR2 = window.devicePixelRatio || 1;
    drawPerfChart(canvasId, pid, hIndexed, xIndexed, ticker, name);
    ctx.scale(DPR2, DPR2);
    const cx = px(best.t), cy = py(best.v);
    ctx.strokeStyle = 'rgba(26,44,78,0.2)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + pH); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2);
    ctx.fillStyle = '#1a2c4e'; ctx.fill();
    if (xlvBest) {
      ctx.beginPath(); ctx.arc(cx, py(xlvBest.v), 3, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(155,28,46,0.8)'; ctx.fill();
    }
  });

  canvas.addEventListener('mouseleave', function() {
    hideTip(); this.style.cursor = 'default';
    const d = this._perfData;
    if (d) drawPerfChart(canvasId, pid, d.hIndexed, d.xIndexed, d.ticker, d.name);
  });
}

renderAll();
</script>
